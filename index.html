<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f6f8;
            text-align: center;
        }

        header {
            background: #0d6efd;
            color: white;
            padding: 20px;
        }

        section {
            margin: 30px;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        a {
            color: #0d6efd;
            text-decoration: none;
            font-weight: bold;
        }

        input, textarea {
            width: 80%;
            padding: 10px;
            margin: 8px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            background: #0d6efd;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }

        footer {
            background: #222;
            color: white;
            padding: 10px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<header>
    <h1>Your Name</h1>
    <p>Web Developer | Student | Programmer</p>
</header>

<section>
    <h2>About Me</h2>
    <p>Hello! Welcome to my portfolio website hosted using GitHub Pages.</p>
</section>

<section>
    <h2>Projects</h2>
    <p><a href="#">Project 1</a></p>
    <p><a href="#">Project 2</a></p>
</section>

<section>
    <h2>My Links</h2>
    <p><a href="https://github.com/">GitHub</a></p>
    <p><a href="https://leetcode.com/">LeetCode</a></p>
    <p><a href="https://skillrack.com/">SkillRack</a></p>
</section>

<section>
    <h2>Contact Me</h2>
    <form>
        <input type="text" placeholder="Your Name" required><br>
        <input type="email" placeholder="Email" required><br>
        <textarea placeholder="Message"></textarea><br>
        <button type="submit">Send</button>
    </form>
</section>

<footer>
    <p>© 2026 Your Name | Hosted on GitHub</p>
</footer>

</body>
</html>
